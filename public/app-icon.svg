<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- 배경 -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- N 글자 -->
  <text x="256" y="300" font-family="Arial, Helvetica, sans-serif" font-size="280" font-weight="900" fill="white" text-anchor="middle" dominant-baseline="middle">N</text>
  <!-- 하단 바 -->
  <rect x="100" y="400" width="312" height="8" rx="4" fill="rgba(255,255,255,0.5)"/>
  <!-- 하단 점 (경매 펄스) -->
  <circle cx="256" cy="440" r="12" fill="#22c55e"/>
